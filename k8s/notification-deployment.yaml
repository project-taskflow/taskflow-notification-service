apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dev
  # labels:
  #   app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      # securityContext:
      #   runAsNonRoot: true
      #   runAsUser: 1001
      containers:
        - name: notification-service
          image: thanusri22/notification-service:v1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGODB_URI
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 3004
          #   initialDelaySeconds: 15
          #   periodSeconds: 20
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 3004
          #   initialDelaySeconds: 5
          #   periodSeconds: 10


